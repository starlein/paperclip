# HTTP edge for Cloudflare Flexible (or direct) → Paperclip on :3100 inside the compose network.
# Do not terminate TLS here; Cloudflare handles HTTPS at the edge.

map $http_x_forwarded_proto $pc_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream paperclip_upstream {
    server server:3100;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    location / {
        proxy_pass http://paperclip_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare sends https when the visitor used HTTPS (Flexible still sets this).
        proxy_set_header X-Forwarded-Proto $pc_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
