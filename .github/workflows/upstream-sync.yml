name: Upstream Sync

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SYNC_TOKEN: ${{ secrets.UPSTREAM_SYNC_GH_TOKEN != '' && secrets.UPSTREAM_SYNC_GH_TOKEN || github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.SYNC_TOKEN }}

      - name: Run upstream sync
        run: |
          set -euo pipefail
          chmod +x ./scripts/upstream-sync.sh
          ./scripts/upstream-sync.sh

      - name: Stop when no upstream delta
        if: ${{ hashFiles('.upstream-sync-noop') != '' }}
        run: |
          set -euo pipefail
          echo "No upstream changes detected; skipping PR update."
          cat .upstream-sync-summary.md

      - name: Open or update integration PR
        if: ${{ hashFiles('.upstream-sync-noop') == '' }}
        env:
          GH_TOKEN: ${{ env.SYNC_TOKEN }}
        run: |
          set -euo pipefail
          existing_number=$(gh pr list \
            --base master \
            --head integration/upstream-sync \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "${existing_number:-}" ]; then
            gh pr edit "$existing_number" --body "$(cat .upstream-sync-summary.md)"
            echo "Updated PR #$existing_number"
            exit 0
          fi

          set +e
          create_output=$(gh pr create \
            --base master \
            --head integration/upstream-sync \
            --title "chore: upstream sync $(date +%Y-%m-%d)" \
            --body "$(cat .upstream-sync-summary.md)" 2>&1)
          create_exit=$?
          set -e

          if [ "$create_exit" -ne 0 ]; then
            printf '%s\n' "$create_output" >&2
            if echo "$create_output" | grep -q "Resource not accessible by integration"; then
              echo "Set repository secret UPSTREAM_SYNC_GH_TOKEN to a token with pull-request write access." >&2
            fi
            exit "$create_exit"
          fi

          printf '%s\n' "$create_output"
