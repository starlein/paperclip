name: Merge Automation

on:
  status: {}
  check_run:
    types: [completed]

concurrency:
  group: merge-automation-${{ github.event.commit.sha || github.event.check_run.head_sha }}
  cancel-in-progress: false

jobs:
  evaluate-merge:
    # Run on ai-review/verdict status events OR when verify/policy/review check runs complete
    if: >-
      (github.event_name == 'status' && github.event.context == 'ai-review/verdict') ||
      (github.event_name == 'check_run' && github.event.check_run.conclusion == 'success' &&
       contains(fromJSON('["verify","policy","review"]'), github.event.check_run.name))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      statuses: read
      checks: read

    steps:
      - name: Evaluate merge conditions
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve SHA from either event type
            const sha = context.eventName === 'status'
              ? context.payload.commit.sha
              : context.payload.check_run.head_sha;

            console.log(`Triggered by ${context.eventName} event for SHA ${sha}`);

            // Find associated open PRs
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            const openPRs = prs.filter(pr => pr.state === 'open');
            if (openPRs.length === 0) {
              console.log('No open PR found for this commit, skipping.');
              return;
            }

            const pr = openPRs[0];
            console.log(`PR #${pr.number}: ${pr.title}`);

            // Collect all statuses for this commit
            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });

            const statusMap = {};
            for (const s of combined.statuses) {
              statusMap[s.context] = s.state;
            }

            // Check ai-review/verdict — must be success with PASS or HIGH_RISK
            const verdictStatus = combined.statuses.find(s => s.context === 'ai-review/verdict');
            if (!verdictStatus || verdictStatus.state !== 'success') {
              console.log('ai-review/verdict not yet successful, skipping.');
              return;
            }

            const description = verdictStatus.description || '';
            console.log(`ai-review/verdict: state=${verdictStatus.state}, description="${description}"`);

            // --- HIGH RISK: log but continue to auto-merge ---
            if (description.includes('HIGH_RISK') || description.includes('HUMAN_REQUIRED')) {
              console.log('Verdict is HIGH_RISK — auto-merging with elevated visibility.');
            }

            // --- FAIL: blockers found ---
            if (description.includes('FAIL')) {
              console.log('Verdict is FAIL — auto-merge blocked until issues are resolved.');
              return;
            }

            // --- PASS / PASS_WITH_NOTES / HIGH_RISK: check remaining conditions ---
            if (!description.includes('PASS') && !description.includes('HIGH_RISK')) {
              console.log(`Unexpected verdict "${description}", skipping.`);
              return;
            }

            // Also check GitHub Actions check runs (verify, policy are check runs)
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });

            for (const run of checkRuns.check_runs) {
              if (run.conclusion === 'success') {
                statusMap[run.name] = 'success';
              }
            }

            // Required CI checks
            const requiredChecks = ['verify', 'policy'];
            const missing = requiredChecks.filter(c => statusMap[c] !== 'success');

            if (missing.length > 0) {
              console.log(`CI checks not yet passing: ${missing.join(', ')}. Auto-merge deferred.`);
              return;
            }

            // All conditions met — attempt merge (with branch update if behind)
            console.log('All merge conditions satisfied. Merging...');
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `${pr.title} (#${pr.number})`,
              });
              console.log(`PR #${pr.number} merged successfully.`);
            } catch (error) {
              // If merge failed because branch is behind, update it and let
              // the next CI cycle re-trigger this workflow via a new ai-review status.
              if (error.message && error.message.includes('not in a mergeable state')) {
                console.log('PR is behind base branch. Attempting branch update...');
                try {
                  await github.rest.pulls.updateBranch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                  });
                  console.log(`PR #${pr.number} branch updated. Will re-evaluate after CI.`);
                } catch (updateError) {
                  console.log(`Branch update failed: ${updateError.message}`);
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body: [
                      '## Merge Automation',
                      '',
                      `Auto-merge failed and branch update failed: \`${updateError.message}\``,
                      '',
                      'This likely means the branch has merge conflicts. Manual rebase required.',
                    ].join('\n'),
                  });
                }
              } else {
                console.log(`Merge failed: ${error.message}`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: [
                    '## Merge Automation',
                    '',
                    `Auto-merge conditions were met but merge failed: \`${error.message}\``,
                    '',
                    'Manual merge may be required.',
                  ].join('\n'),
                });
              }
            }
