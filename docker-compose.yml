services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        USER_UID: ${USER_UID}
        USER_GID: ${USER_GID}
    container_name: paperclip
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${PAPERCLIP_DATA_DIR}:/paperclip
      - /home/trbck/wp:/wp
      - /home/trbck/.gitconfig:/paperclip/.gitconfig:ro
      - /home/trbck/.git-credentials:/paperclip/.git-credentials:ro
    environment:
      HOST: 127.0.0.1
      PORT: ${PAPERCLIP_PORT}
      NODE_ENV: production
      HOME: /paperclip
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /paperclip/instances/default/config.json
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_AUTH_SECRET: ${PAPERCLIP_AUTH_SECRET}
      PAPERCLIP_ALLOWED_HOST: ${PAPERCLIP_ALLOWED_HOST}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}
      OPENCODE_ALLOW_ALL_MODELS: "true"
      PAPERCLIP_TELEMETRY_DISABLED: "true"
      PAPERCLIP_AUTH_DISABLE_SIGN_UP: ${PAPERCLIP_AUTH_DISABLE_SIGN_UP}
      USER_UID: ${USER_UID}
      USER_GID: ${USER_GID}
      OLLAMA_HOST: ${OLLAMA_HOST}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${HOME}/.local/bin
