services:
#  ollama:
#    image: ollama/ollama:latest
#    container_name: ollama
#    restart: unless-stopped
#    volumes:
#      - ${OLLAMA_DATA_DIR}:/root/.ollama
#    ports:
#      - "127.0.0.1:${OLLAMA_PORT}:11434"
#    healthcheck:
#      test: ["CMD", "ollama", "list"]
#      interval: 15s
#      timeout: 5s
#      retries: 20
  postgres:
    image: postgres:17-alpine
    container_name: paperclip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: paperclip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Intentionally no host port mapping: PostgreSQL is only reachable on the Docker network.

  redis:
    image: redis:7-alpine
    container_name: paperclip-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Intentionally no host port mapping: Redis is only reachable on the Docker network.

  paperclip:
    image: ghcr.io/starlein/paperclip:v2026.609.0
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        DOCKER_GID: ${DOCKER_GID:-992}
    container_name: paperclip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
#      ollama:
#        condition: service_healthy
    expose:
      # Internal only: nginx reaches Paperclip over the Docker network.
      # The app/API port is not published on the host.
      - "3100"
    volumes:
      - ${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip
    environment:
      HOST: 0.0.0.0
      PORT: 3100
      SERVE_UI: "true"
      DATABASE_URL: "postgres://paperclip:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/paperclip"
      REDIS_URL: redis://redis:6379
      PAPERCLIP_REDIS_URL: redis://redis:6379
      NODE_ENV: production
      HOME: /paperclip
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /paperclip/instances/default/config.json
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_AUTH_DISABLE_SIGN_UP: "true"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      PAPERCLIP_AUTH_SECRET: "${PAPERCLIP_AUTH_SECRET:-}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES:-localhost,127.0.0.1}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-https://localhost}"
      OPENCODE_ALLOW_ALL_MODELS: "true"
      PAPERCLIP_TELEMETRY_DISABLED: "true"
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/paperclip/.local/bin
      DOCKER_HOST: unix:///var/run/docker.sock
#      OLLAMA_HOST: ${OLLAMA_HOST}

  proxy:
    image: paperclip-nginx-selfsigned:local
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: paperclip-proxy
    restart: unless-stopped
    depends_on:
      paperclip:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      PAPERCLIP_TLS_SERVER_NAME: "${PAPERCLIP_TLS_SERVER_NAME:-localhost}"
      PAPERCLIP_TLS_CERT_ALT_NAMES: "${PAPERCLIP_TLS_CERT_ALT_NAMES:-DNS:localhost,IP:127.0.0.1}"
    volumes:
      - ./docker/nginx/paperclip.conf:/etc/nginx/conf.d/default.conf:ro
      - proxy-certs:/etc/nginx/certs

volumes:
  postgres-data:
  redis-data:
  proxy-certs:
